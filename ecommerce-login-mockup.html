<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电商 APP 登录页面 - Mockup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .phone-frame {
            width: 375px;
            height: 812px;
            background: #fff;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
        }
        .status-bar {
            height: 44px;
            background: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .content {
            padding: 40px 30px;
            height: calc(812px - 44px);
            display: flex;
            flex-direction: column;
        }
        .logo-section {
            text-align: center;
            margin-bottom: 50px;
            margin-top: 40px;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 15px;
        }
        .app-name {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        .form-section {
            flex: 1;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 15px;
            background: #f8f9fa;
            transition: all 0.3s;
        }
        .input-wrapper:focus-within {
            border-color: #667eea;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .input-icon {
            width: 24px;
            margin-right: 12px;
            color: #999;
        }
        .input-field {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 16px;
            outline: none;
        }
        .input-field::placeholder {
            color: #bbb;
        }
        .code-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: transform 0.2s;
        }
        .login-btn:active {
            transform: scale(0.98);
        }
        .social-login {
            text-align: center;
            margin-top: 30px;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }
        .divider-text {
            padding: 0 15px;
            color: #999;
            font-size: 13px;
        }
        .wechat-icon {
            width: 50px;
            height: 50px;
            background: #07c160;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .wechat-icon:active {
            transform: scale(0.95);
        }
        .links-section {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
        }
        .link {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .link:hover {
            text-decoration: underline;
        }
        .footer-text {
            text-align: center;
            margin-top: auto;
            padding-bottom: 20px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <span>9:41</span>
            <span>📶 🔋</span>
        </div>
        <div class="content">
            <div class="logo-section">
                <div class="logo">🛒</div>
                <div class="app-name">优品商城</div>
            </div>
            
            <div class="form-section">
                <div class="input-group">
                    <div class="input-wrapper">
                        <span class="input-icon">📱</span>
                        <input type="tel" class="input-field" placeholder="请输入手机号" maxlength="11">
                    </div>
                </div>
                
                <div class="input-group">
                    <div class="input-wrapper">
                        <span class="input-icon">🔐</span>
                        <input type="text" class="input-field" placeholder="请输入验证码" maxlength="6">
                        <button class="code-btn">获取验证码</button>
                    </div>
                </div>
                
                <button class="login-btn">登录</button>
                
                <div class="social-login">
                    <div class="divider">
                        <span class="divider-text">其他登录方式</span>
                    </div>
                    <div class="wechat-icon">💬</div>
                </div>
                
                <div class="links-section">
                    <a href="#" class="link">忘记密码？</a>
                    <a href="#" class="link">注册账号</a>
                </div>
            </div>
            
            <div class="footer-text">
                登录即代表您同意《用户协议》和《隐私政策》
            </div>
        </div>
    </div>
</body>
</html>
